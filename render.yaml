services:
  - type: worker
    name: motorcycle-bot
    env: python
    buildCommand: pip install -r requirements.txt
    startCommand: python bot.py
    envVars:
      - key: TELEGRAM_BOT_TOKEN
        sync: false
      - key: TELEGRAM_CHAT_ID
        sync: false
      - key: APIFY_API_TOKEN
        sync: false
      - key: SEARCH_LOCATION
        value: tustin-ca
